name: shepherds_app
publish_to: 'none'
description: Beginner-friendly Shepherd's catering and events homepage UI.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  firebase_core: ^4.12.1
  cloud_firestore: ^6.7.1
  firebase_auth: ^6.5.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/gallery/
    - assets/data/
